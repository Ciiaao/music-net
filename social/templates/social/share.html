{% extends 'base.html' %}

{% block content %}
<style>
    .share-container { max-width: 600px; margin: 40px auto; background: var(--bg-panel); padding: 30px; border-radius: var(--border-radius); }
    .share-header { margin-bottom: 20px; font-size: 24px; font-weight: bold; }
    
    .attachment-preview { background: #000; padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent-color); margin-bottom: 20px; }
    .attachment-preview i { font-size: 24px; color: var(--accent-color); margin-bottom: 10px; display: block; }
    
    .share-form textarea {
        width: 100%;
        background: var(--bg-base);
        border: 1px solid #333;
        color: white;
        padding: 15px;
        border-radius: 8px;
        resize: vertical;
        min-height: 120px;
        margin-bottom: 20px;
        font-family: inherit;
        outline: none;
    }
    .share-form textarea:focus { border-color: var(--accent-color); }
</style>

<div class="share-container">
    <div class="share-header"><i class="fa-solid fa-retweet" style="color: var(--accent-color);"></i> Share to Feed</div>
    
    <div class="attachment-preview">
        {% if song %}
            <i class="fa-solid fa-music"></i>
            <strong>{{ song.title }}</strong>
            <div style="color: var(--text-muted); font-size: 14px;">by {{ song.artist }}</div>
        {% elif playlist %}
            <i class="fa-solid fa-list-ul"></i>
            <strong>{{ playlist.title }}</strong>
            <div style="color: var(--text-muted); font-size: 14px;">{{ playlist.songs.count }} Tracks &bull; Created by {{ playlist.owner.username }}</div>
        {% endif %}
    </div>

    <form method="POST" class="share-form">
        {% csrf_token %}
        <textarea name="content" placeholder="Say something about this..." autofocus required></textarea>
        
        <div style="display: flex; gap: 15px; justify-content: flex-end;">
            <a href="javascript:history.back()" class="btn-outline" style="text-decoration: none; padding: 12px 24px;">Cancel</a>
            <button type="submit" class="btn-primary">Post Now</button>
        </div>
    </form>
</div>
{% endblock %}
